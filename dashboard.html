<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-ink Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="e-ink">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 28px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ---- Header ---- */
        .header {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 1rem;
            font-weight: 600;
            color: #888;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        #status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #1a1a1a;
            color: #666;
            border: 1px solid #222;
        }
        #status.connected { background: #0d2b14; color: #4ade80; border-color: #166534; }
        #status.error     { background: #2b0d0d; color: #f87171; border-color: #7f1d1d; }

        /* ---- Main layout ---- */
        .main {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 20px;
        }

        /* ---- Left column ---- */
        .left-col { display: flex; flex-direction: column; gap: 14px; }

        /* ---- Clock hero ---- */
        .clock-card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 16px;
            padding: 28px 24px 24px;
        }
        #big-time {
            font-family: 'DM Mono', monospace;
            font-size: 4rem;
            font-weight: 500;
            color: #fff;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 6px;
        }
        #big-date {
            font-size: 0.9rem;
            color: #aaa;
            font-weight: 500;
        }

        /* ---- Data cards ---- */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .data-card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }
        .data-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent, #333);
        }
        .data-card.weather { --accent: #3b82f6; }
        .data-card.commute { --accent: #f59e0b; }
        .data-card.game    { --accent: #f97316; grid-column: 1 / -1; }

        .card-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #aaa;
            margin-bottom: 10px;
        }
        .card-value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            margin-bottom: 4px;
        }
        .card-sub {
            font-size: 0.82rem;
            color: #aaa;
        }
        .game-halves { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-top: 4px; }
        .game-half { padding-right: 18px; }
        .game-half + .game-half { padding-left: 18px; padding-right: 0; border-left: 1px solid #222; }
        .game-result { font-size: 1.5rem; font-weight: 700; line-height: 1; margin: 4px 0 3px; }
        .game-result.win  { color: #4ade80; }
        .game-result.loss { color: #f87171; }
        .game-result.live { color: #fb923c; }

        /* ---- Push controls ---- */
        .push-card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 18px;
        }
        .push-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        #push-btn {
            background: #f0f0f0;
            color: #0a0a0a;
            flex: 1;
        }
        #push-btn:hover:not(:disabled) { background: #fff; }
        #push-btn:disabled { background: #222; color: #555; cursor: not-allowed; }

        select {
            padding: 10px 12px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #ccc;
            font-size: 0.85rem;
        }

        #countdown {
            font-size: 0.78rem;
            color: #444;
            font-family: 'DM Mono', monospace;
        }

        /* ---- Settings ---- */
        details { margin-top: 4px; }
        summary {
            font-size: 0.78rem;
            color: #444;
            cursor: pointer;
            user-select: none;
            padding: 6px 0;
            list-style: none;
        }
        summary:hover { color: #888; }
        summary::before { content: '+ '; }
        details[open] summary::before { content: '- '; }
        .settings-body { padding-top: 14px; display: flex; flex-direction: column; gap: 10px; }
        .field label { display: block; font-size: 0.75rem; color: #555; margin-bottom: 5px; }
        .field input[type=text] {
            width: 100%;
            padding: 9px 12px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #ccc;
            font-size: 0.85rem;
            outline: none;
        }
        .field input:focus { border-color: #444; }
        .save-btn {
            background: #1e1e1e;
            color: #aaa;
            border: 1px solid #2a2a2a;
            padding: 8px 16px;
            font-size: 0.82rem;
            align-self: flex-start;
        }
        .save-btn:hover { background: #2a2a2a; color: #eee; }

        /* ---- Right column: e-ink preview ---- */
        .right-col { display: flex; flex-direction: column; gap: 12px; }

        .preview-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #444;
        }

        .eink-frame {
            background: #c8c8c0;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 0 0 1px #222, inset 0 2px 6px rgba(0,0,0,0.4);
        }

        #eink-preview {
            display: block;
            width: 100%;
            aspect-ratio: 400/300;
            image-rendering: pixelated;
        }

        .preview-note {
            font-size: 0.7rem;
            color: #333;
            text-align: center;
            font-family: 'DM Mono', monospace;
        }

        @media (max-width: 720px) {
            .main { grid-template-columns: 1fr; }
            .right-col { order: -1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>e-ink Dashboard</h1>
        <div id="status">Connecting...</div>
    </div>

    <div class="main">
        <!-- Left: data + controls -->
        <div class="left-col">

            <div class="clock-card">
                <div id="big-time">--:-- --</div>
                <div id="big-date">Loading...</div>
            </div>

            <div class="data-grid">
                <div class="data-card weather">
                    <div class="card-label">Weather</div>
                    <div class="card-value" id="w-temp">--</div>
                    <div class="card-sub" id="w-cond">Locating...</div>
                    <div class="card-sub" id="w-loc" style="color:#555; margin-top:2px;"></div>
                </div>
                <div class="data-card commute">
                    <div class="card-label">Commute</div>
                    <div class="card-value" id="w-commute">--</div>
                    <div class="card-sub" id="w-commute-sub">Set addresses below</div>
                </div>
                <div class="data-card game">
                    <div class="card-label">March Madness &mdash; <span id="team-name-display" style="font-weight:400;text-transform:none;letter-spacing:0;color:#666;">no team selected</span></div>
                    <div class="game-halves">
                        <div class="game-half">
                            <div style="font-size:0.65rem;color:#555;text-transform:uppercase;letter-spacing:0.08em;">Last Game</div>
                            <div id="game-last-result" class="game-result">--</div>
                            <div id="game-last-opp" class="card-sub">--</div>
                        </div>
                        <div class="game-half">
                            <div style="font-size:0.65rem;color:#555;text-transform:uppercase;letter-spacing:0.08em;">Next Game</div>
                            <div id="game-next-date" class="game-result" style="color:#fff;font-size:1.1rem;">--</div>
                            <div id="game-next-opp" class="card-sub">--</div>
                        </div>
                    </div>
                </div>
                <div class="data-card" style="--accent:#a855f7; grid-column: 1 / -1;">
                    <div class="card-label">Last Message</div>
                    <div class="card-value" id="w-message" style="font-size:1rem; color:#aaa;">No messages yet</div>
                </div>
            </div>

            <div class="push-card">
                <div class="push-row">
                    <button id="push-btn" disabled>Push to Display</button>
                </div>

                <details>
                    <summary>Commute settings</summary>
                    <div class="settings-body">
                        <div class="field">
                            <label>Origin</label>
                            <input type="text" id="origin" placeholder="123 Main St, New York NY">
                        </div>
                        <div class="field">
                            <label>Destination</label>
                            <input type="text" id="destination" placeholder="456 Broadway, New York NY">
                        </div>
                        <button class="save-btn" id="save-btn">Save &amp; Calculate</button>
                    </div>
                </details>
                <details>
                    <summary>March Madness team</summary>
                    <div class="settings-body">
                        <div class="field">
                            <label>League</label>
                            <select id="team-league">
                                <option value="mens-college-basketball">Men's</option>
                                <option value="womens-college-basketball">Women's</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Team name</label>
                            <input type="text" id="team-input" placeholder="e.g. Duke, LSU, UConn">
                        </div>
                        <div id="team-status" style="font-size:0.75rem;color:#555;min-height:1em;"></div>
                        <button class="save-btn" id="team-save-btn">Set Team</button>
                    </div>
                </details>
            </div>

        </div>

        <!-- Right: e-ink preview -->
        <div class="right-col">
            <div class="preview-label">E-ink Preview (400x300)</div>
            <div class="eink-frame">
                <canvas id="eink-preview" width="400" height="300"></canvas>
            </div>
            <div class="preview-note">dithered / what the display will show</div>
        </div>
    </div>

    <!-- Hidden render canvas (full quality, used to generate e-ink image) -->
    <canvas id="render-canvas" width="400" height="300" style="display:none"></canvas>

    <script>
        const TOPIC        = "e_ink_link/message/675072780505b8dc19b65928";
        const CHUNK_BYTES  = 3000;
        const TOTAL_CHUNKS = 5;

        // ---- MQTT ----
        const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
            clientId: "eink_dash_" + Math.random().toString(16).slice(2, 8)
        });
        const statusEl = document.getElementById("status");
        const pushBtn  = document.getElementById("push-btn");

        client.on("connect", () => {
            statusEl.textContent = "Connected"; statusEl.className = "connected"; pushBtn.disabled = false;
            client.subscribe(TOPIC);
        });
        client.on("error",   () => { statusEl.textContent = "Connection error"; statusEl.className = "error"; pushBtn.disabled = true; });
        client.on("close",   () => { statusEl.textContent = "Disconnected"; statusEl.className = ""; pushBtn.disabled = true; });
        client.on("message", (topic, payload) => {
            const msg = payload.toString();
            if (msg.startsWith("IMG:")) return;
            if (msg === "HEARTBEAT") return;
            if (msg === "PUSHING") {
                pushBtn.disabled = true;
                setTimeout(() => { pushBtn.disabled = !client.connected; }, 5000);
                return;
            }

            // Signal from test page: image pushed, server handles return
            if (msg === "CMD:RETURN") return;

            // Signal from test page: text pushed as image, just update Last Message card
            if (msg.startsWith("TXT:")) {
                const text = msg.slice(4);
                lastMessage = text;
                const el = document.getElementById("w-message");
                el.textContent = text;
                el.style.color = "#fff";
                return;
            }
        });

        // ---- State ----
        let weatherTemp = "--", weatherCond = "", coords = null, locationName = "";
        let commuteText = "--", commuteSub  = "Set addresses below";
        let lastMessage = "";
        let lastGame = null;   // { won, live, ourScore, theirScore, opponent }
        let nextGame = null;   // { opponent, dateStr }
        let teamId   = null;
        let teamName = "";

        const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

        // ---- ESPN / March Madness ----
        let teamLeague = "mens-college-basketball";

        async function searchTeam(name) {
            const r = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/${teamLeague}/teams?limit=700`);
            const d = await r.json();
            const teams = d.sports[0].leagues[0].teams;
            const q = name.trim().toLowerCase();
            return teams.find(t =>
                t.team.displayName.toLowerCase().includes(q) ||
                t.team.shortDisplayName.toLowerCase().includes(q) ||
                t.team.abbreviation.toLowerCase() === q
            )?.team || null;
        }

        async function fetchTeamGames() {
            if (!teamId) return;
            try {
                const r = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/${teamLeague}/teams/${teamId}/schedule`);
                const d = await r.json();
                const events = d.events || [];

                // Find live game first
                const live = events.find(e => e.competitions[0].status.type.state === "in");
                if (live) {
                    const comp = live.competitions[0];
                    const us   = comp.competitors.find(c => String(c.team.id) === String(teamId));
                    const them = comp.competitors.find(c => String(c.team.id) !== String(teamId));
                    const sc   = (c) => c?.score?.displayValue ?? c?.score?.value ?? c?.score ?? "?";
                    lastGame = { live: true, ourScore: sc(us), theirScore: sc(them), opponent: them?.team.abbreviation || them?.team.shortDisplayName || "?", won: false };
                } else {
                    const done = events.filter(e => e.competitions[0].status.type.completed);
                    if (done.length) {
                        const ev   = done[done.length - 1];
                        const comp = ev.competitions[0];
                        const us   = comp.competitors.find(c => String(c.team.id) === String(teamId));
                        const them = comp.competitors.find(c => String(c.team.id) !== String(teamId));
                        const sc   = (c) => c?.score?.displayValue ?? c?.score?.value ?? c?.score ?? "?";
                        lastGame = { live: false, won: us?.winner ?? false, ourScore: sc(us), theirScore: sc(them), opponent: them?.team.abbreviation || them?.team.shortDisplayName || "?" };
                    }
                }

                const upcoming = events.filter(e => !e.competitions[0].status.type.completed && new Date(e.date) > new Date());
                if (upcoming.length) {
                    const ev   = upcoming[0];
                    const comp = ev.competitions[0];
                    const them = comp.competitors.find(c => String(c.team.id) !== String(teamId));
                    const gd   = new Date(ev.date);
                    nextGame = { opponent: them?.team.abbreviation || them?.team.shortDisplayName || "TBD", dateStr: `${MONTHS_SHORT[gd.getMonth()]} ${gd.getDate()}` };
                } else {
                    nextGame = null;
                }

                updateGameCard();
                renderEink();
            } catch(e) { console.error("ESPN fetch failed:", e); }
        }

        function abbrev(name, max) { return name.length > max ? name.slice(0, max) : name; }

        function updateGameCard() {
            document.getElementById("team-name-display").textContent = teamName || "no team selected";
            const resEl  = document.getElementById("game-last-result");
            const oppEl  = document.getElementById("game-last-opp");
            if (lastGame) {
                const myName  = abbrev(teamName, 10);
                const oppName = lastGame.opponent;
                if (lastGame.live) {
                    resEl.textContent = `${lastGame.ourScore}-${lastGame.theirScore}`;
                    resEl.className = "game-result live";
                    oppEl.textContent = `LIVE: ${myName} vs ${oppName}`;
                } else {
                    resEl.textContent = `${lastGame.won ? "W" : "L"} ${lastGame.ourScore}-${lastGame.theirScore}`;
                    resEl.className = `game-result ${lastGame.won ? "win" : "loss"}`;
                    oppEl.textContent = `${myName} vs ${oppName}`;
                }
            }
            const dateEl = document.getElementById("game-next-date");
            const nextEl = document.getElementById("game-next-opp");
            if (nextGame) {
                dateEl.textContent = nextGame.dateStr;
                nextEl.textContent = `vs ${nextGame.opponent}`;
            } else {
                dateEl.textContent = "Season over";
                nextEl.textContent = "";
            }
        }

        // ---- Reverse geocode for location name ----
        async function reverseGeocode(lat, lon) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers: { "Accept-Language": "en" } });
                const d = await r.json();
                locationName = d.address.city || d.address.town || d.address.village || d.address.county || "";
                document.getElementById("w-loc").textContent = locationName;
                publishConfig({ location_name: locationName });
                renderEink();
            } catch(e) {}
        }

        // ---- WMO code -> description ----
        function wmoDesc(c) {
            if (c === 0)  return "Clear Sky";
            if (c <= 2)   return "Partly Cloudy";
            if (c === 3)  return "Overcast";
            if (c <= 49)  return "Foggy";
            if (c <= 59)  return "Drizzle";
            if (c <= 69)  return "Rain";
            if (c <= 79)  return "Snow";
            if (c <= 82)  return "Rain Showers";
            if (c <= 86)  return "Snow Showers";
            if (c <= 99)  return "Thunderstorm";
            return "Unknown";
        }

        // ---- Weather ----
        async function fetchWeather(lat, lon) {
            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=fahrenheit`);
                const d = await r.json();
                const cw = d.current_weather;
                weatherTemp = Math.round(cw.temperature) + "F";
                weatherCond = wmoDesc(cw.weathercode);
                document.getElementById("w-temp").textContent = weatherTemp;
                document.getElementById("w-cond").textContent = weatherCond;
                renderEink();
            } catch(e) {
                document.getElementById("w-cond").textContent = "Unavailable";
            }
        }

        function publishConfig(obj) {
            if (client.connected) client.publish(TOPIC, "CFG:" + JSON.stringify(obj));
        }

        function getLocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(pos => {
                coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                fetchWeather(coords.lat, coords.lon);
                reverseGeocode(coords.lat, coords.lon);
                publishConfig({ lat: coords.lat, lon: coords.lon });
            }, () => {
                document.getElementById("w-cond").textContent = "Location denied";
            });
        }

        // ---- Commute ----
        async function geocode(addr) {
            const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`, { headers: { "Accept-Language": "en" } });
            const d = await r.json();
            if (!d.length) throw new Error("Not found: " + addr);
            return { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) };
        }

        async function fetchCommute() {
            const origin = localStorage.getItem("eink_origin");
            const dest   = localStorage.getItem("eink_dest");
            if (!origin || !dest) return;
            document.getElementById("w-commute-sub").textContent = "Calculating...";
            try {
                const [a, b] = await Promise.all([geocode(origin), geocode(dest)]);
                const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=false`);
                const d = await r.json();
                const mins = Math.round(d.routes[0].duration / 60);
                commuteText = `${mins}`;
                commuteSub  = `min drive`;
                document.getElementById("w-commute").textContent = mins;
                document.getElementById("w-commute-sub").textContent = "min drive";
                renderEink();
            } catch(e) {
                document.getElementById("w-commute-sub").textContent = e.message.slice(0, 30);
            }
        }

        // ---- Render centered message canvas ----
        function renderMessage(text) {
            const rc  = document.getElementById("render-canvas");
            const ctx = rc.getContext("2d");
            const W = 400, H = 300;

            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, W, H);

            // Pick font size based on length
            let fontSize = text.length > 80 ? 20 : text.length > 40 ? 26 : 34;
            const maxWidth = W - 48;
            const lineHeight = Math.round(fontSize * 1.45);

            ctx.fillStyle = "#000";
            ctx.font = `bold ${fontSize}px Arial, sans-serif`;
            ctx.textBaseline = "top";

            // Word-wrap
            const lines = [];
            for (const rawLine of text.split("\n")) {
                const words = rawLine.split(" ");
                let line = "";
                for (const word of words) {
                    const test = line ? line + " " + word : word;
                    if (ctx.measureText(test).width > maxWidth && line) {
                        lines.push(line); line = word;
                    } else { line = test; }
                }
                if (line || rawLine === "") lines.push(line);
            }

            // Vertically center the text block
            const totalH = lines.length * lineHeight;
            const startY = Math.round((H - totalH) / 2);

            ctx.textAlign = "center";
            lines.forEach((l, i) => ctx.fillText(l, W / 2, startY + i * lineHeight));

            updateEinkPreview(rc);
        }

        // ---- Render e-ink canvas ----
        function renderEink() {
            const rc  = document.getElementById("render-canvas");
            const ctx = rc.getContext("2d");
            const W = 400, H = 300;

            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, W, H);

            const now      = new Date();
            const MONTHS   = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            const today    = now.getDate();
            const month    = now.getMonth();
            const year     = now.getFullYear();
            const daysInMonth    = new Date(year, month + 1, 0).getDate();
            const firstDayOfWeek = new Date(year, month, 1).getDay();
            const daysLeft       = daysInMonth - today;

            ctx.fillStyle = "#000";
            ctx.textBaseline = "top";

            // ---- CALENDAR SECTION (top, ~160px) ----

            // Month + year header
            ctx.font = "bold 15px Arial, sans-serif";
            ctx.textAlign = "left";
            const DAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
            const mm = String(month + 1).padStart(2, "0");
            const dd = String(today).padStart(2, "0");
            ctx.fillText(DAYS_FULL[now.getDay()], 12, 8);
            ctx.font = "13px Arial, sans-serif";
            ctx.fillText(`${mm}.${dd}.${year}`, 12, 26);

            // Days left counter (right)
            ctx.textAlign = "right";
            ctx.font = "bold 13px Arial, sans-serif";
            ctx.fillText(`${daysLeft} days left`, W - 12, 10);

            // Day-of-week headers
            const DAY_LABELS = ["S","M","T","W","T","F","S"];
            const CELL   = 19;
            const GAP    = 3;
            const STRIDE = CELL + GAP;
            const GRID_W = 7 * STRIDE - GAP;
            const GRID_X = Math.round((W - GRID_W) / 2);
            const GRID_Y = 40;

            // Pre-calculate all section positions so nothing is used before defined
            const DIV1 = GRID_Y + 6 * STRIDE + 4;  // ~173
            const SEC1 = DIV1 + 6;                  // ~179
            const DIV2 = SEC1 + 65;                 // ~244
            const SEC2 = DIV2 + 5;                  // ~249
            const DIV3 = SEC2 + 28;                 // ~277

            ctx.font = "bold 9px Arial, sans-serif";
            ctx.textAlign = "center";
            for (let i = 0; i < 7; i++) {
                ctx.fillText(DAY_LABELS[i], GRID_X + i * STRIDE + CELL / 2, 28);
            }

            // Calendar squares
            let day = 1;
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 7; col++) {
                    const cellIdx = row * 7 + col;
                    if (cellIdx < firstDayOfWeek || day > daysInMonth) continue;
                    const x = GRID_X + col * STRIDE;
                    const y = GRID_Y + row * STRIDE;

                    if (day < today) {
                        // Past -- filled black square
                        ctx.fillStyle = "#000";
                        ctx.fillRect(x, y, CELL, CELL);
                    } else if (day === today) {
                        // Today -- filled black with white dot
                        ctx.fillStyle = "#000";
                        ctx.fillRect(x, y, CELL, CELL);
                        ctx.fillStyle = "#fff";
                        ctx.beginPath();
                        ctx.arc(x + CELL/2, y + CELL/2, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        // Future -- empty square outline
                        ctx.strokeStyle = "#000";
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
                    }
                    day++;
                }
            }

            // -- Last updated (bottom-right of calendar section) --
            let hr = now.getHours(), ampm = "AM";
            if (hr >= 12) { ampm = "PM"; if (hr > 12) hr -= 12; }
            if (hr === 0) hr = 12;
            const min = String(now.getMinutes()).padStart(2, "0");
            ctx.font = "10px Arial, sans-serif";
            ctx.textAlign = "right";
            ctx.fillStyle = "#000";
            ctx.fillText(`Updated ${hr}:${min} ${ampm}`, W - 12, DIV1 - 13);

            // ---- DIVIDER ----
            ctx.fillStyle = "#000";
            ctx.fillRect(0, DIV1, W, 1);

            // ---- WEATHER + COMMUTE ----

            ctx.textAlign = "left";
            ctx.font = "bold 9px Arial, sans-serif";
            ctx.fillStyle = "#000";
            ctx.fillText("WEATHER", 14, SEC1);
            ctx.font = "bold 32px Arial, sans-serif";
            ctx.fillText(weatherTemp || "--F", 12, SEC1 + 12);
            ctx.font = "12px Arial, sans-serif";
            const condLine = locationName ? `${weatherCond || "..."}, ${locationName}` : (weatherCond || "...");
            ctx.fillText(condLine, 14, SEC1 + 50);

            ctx.fillStyle = "#000";
            ctx.fillRect(200, DIV1, 1, DIV2 - DIV1);

            ctx.font = "bold 9px Arial, sans-serif";
            ctx.fillText("COMMUTE", 214, SEC1);
            ctx.font = "bold 32px Arial, sans-serif";
            ctx.fillText(commuteText || "--", 212, SEC1 + 12);
            ctx.font = "12px Arial, sans-serif";
            ctx.fillText("min drive", 214, SEC1 + 50);

            // ---- DIVIDER ----
            ctx.fillStyle = "#000";
            ctx.fillRect(0, DIV2, W, 1);

            // ---- MARCH MADNESS ----
            ctx.font = "bold 9px Arial, sans-serif";
            ctx.textAlign = "left";
            ctx.fillStyle = "#000";
            ctx.fillText("LAST GAME", 14, SEC2);
            ctx.font = "bold 13px Arial, sans-serif";
            if (lastGame) {
                const tag  = lastGame.live ? "LIVE" : (lastGame.won ? "W" : "L");
                const myA  = abbrev(teamName, 6);
                const oppA = abbrev(lastGame.opponent, 6);
                ctx.fillText(`${tag} ${myA} ${lastGame.ourScore}-${lastGame.theirScore} ${oppA}`, 14, SEC2 + 12);
            } else {
                ctx.fillText(teamId ? "No games yet" : "No team set", 14, SEC2 + 12);
            }

            ctx.fillRect(200, DIV2, 1, DIV3 - DIV2);

            ctx.font = "bold 9px Arial, sans-serif";
            ctx.fillText("NEXT GAME", 214, SEC2);
            ctx.font = "12px Arial, sans-serif";
            if (nextGame) {
                ctx.fillText(`${nextGame.dateStr} vs ${nextGame.opponent}`, 214, SEC2 + 12);
            } else {
                ctx.fillText(teamId ? "Season over" : "--", 214, SEC2 + 12);
            }

            // ---- MESSAGE ----
            if (DIV3 < H) {
                ctx.fillStyle = "#000";
                ctx.fillRect(0, DIV3, W, 1);
                ctx.font = "11px Arial, sans-serif";
                ctx.textAlign = "left";
                const msgDisplay = (lastMessage ? `MSG: ${lastMessage}` : "MSG: ...");
                let truncated = msgDisplay;
                while (ctx.measureText(truncated).width > W - 20 && truncated.length > 1)
                    truncated = truncated.slice(0, -1);
                if (truncated !== msgDisplay) truncated += "...";
                ctx.fillText(truncated, 12, DIV3 + 8);
            }

            // Copy to preview
            updateEinkPreview(rc);
        }

        // ---- Threshold render canvas -> preview canvas (no dithering for clean graphics) ----
        function updateEinkPreview(src) {
            const pc   = document.getElementById("eink-preview");
            const rctx = src.getContext("2d");
            const pctx = pc.getContext("2d");

            const pixels = rctx.getImageData(0, 0, 400, 300).data;
            const out    = pctx.createImageData(400, 300);
            for (let i = 0; i < 400 * 300; i++) {
                const p = i * 4;
                const gray = 0.299 * pixels[p] + 0.587 * pixels[p+1] + 0.114 * pixels[p+2];
                const v    = gray >= 160 ? 255 : 0;
                out.data[p] = out.data[p+1] = out.data[p+2] = v;
                out.data[p+3] = 255;
            }
            pctx.putImageData(out, 0, 0);
        }

        // ---- Pack 1bpp (threshold, no dithering) ----
        function packEink(src) {
            const pixels = src.getContext("2d").getImageData(0, 0, 400, 300).data;
            const buf    = new Uint8Array(15000);
            for (let row = 0; row < 300; row++) {
                for (let b = 0; b < 50; b++) {
                    let byte = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        const p = (row * 400 + b * 8 + bit) * 4;
                        const gray = 0.299 * pixels[p] + 0.587 * pixels[p+1] + 0.114 * pixels[p+2];
                        if (gray >= 160) byte |= (1 << (7 - bit));
                    }
                    buf[row * 50 + b] = byte;
                }
            }
            return buf;
        }

        function toBase64(buf) {
            let s = "";
            for (let i = 0; i < buf.length; i++) s += String.fromCharCode(buf[i]);
            return btoa(s);
        }

        async function sendImage() {
            const rc  = document.getElementById("render-canvas");
            const buf = packEink(rc);
            const b64 = toBase64(buf);
            pushBtn.disabled = true;
            for (let i = 0; i < TOTAL_CHUNKS; i++) {
                const slice = b64.slice(i * 4000, (i + 1) * 4000);
                client.publish(TOPIC, `IMG:${String(i+1).padStart(2,"0")}/${TOTAL_CHUNKS}:${slice}`);
                pushBtn.textContent = `Sending... ${i+1}/${TOTAL_CHUNKS}`;
                await new Promise(r => setTimeout(r, 150));
            }
            pushBtn.textContent = "Push to Display";
            pushBtn.disabled = false;
        }

        // ---- Clock tick ----
        function tick() {
            const now = new Date();
            const DAYS  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
            const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            let hr = now.getHours(), ampm = "AM";
            if (hr >= 12) { ampm = "PM"; if (hr > 12) hr -= 12; }
            if (hr === 0) hr = 12;
            const min = String(now.getMinutes()).padStart(2,"0");
            const sec = String(now.getSeconds()).padStart(2,"0");
            document.getElementById("big-time").textContent = `${hr}:${min}:${sec} ${ampm}`;
            document.getElementById("big-date").textContent =
                `${DAYS[now.getDay()]} ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

            renderEink();
        }

        pushBtn.addEventListener("click", () => {
            renderEink();
            sendImage();
        });

        // ---- Settings ----
        document.getElementById("origin").value      = localStorage.getItem("eink_origin") || "";
        document.getElementById("destination").value = localStorage.getItem("eink_dest")   || "";
        document.getElementById("save-btn").addEventListener("click", () => {
            const origin = document.getElementById("origin").value.trim();
            const dest   = document.getElementById("destination").value.trim();
            localStorage.setItem("eink_origin", origin);
            localStorage.setItem("eink_dest",   dest);
            publishConfig({ commute_origin: origin, commute_dest: dest });
            fetchCommute();
        });

        // ---- Team settings ----
        teamLeague = localStorage.getItem("eink_team_league") || "mens-college-basketball";
        document.getElementById("team-league").value = teamLeague;
        document.getElementById("team-league").addEventListener("change", () => {
            teamLeague = document.getElementById("team-league").value;
            localStorage.setItem("eink_team_league", teamLeague);
        });
        document.getElementById("team-input").value = localStorage.getItem("eink_team_name") || "";
        document.getElementById("team-save-btn").addEventListener("click", async () => {
            const input = document.getElementById("team-input").value.trim();
            const statusEl = document.getElementById("team-status");
            if (!input) return;
            statusEl.textContent = "Searching...";
            statusEl.style.color = "#666";
            try {
                const t = await searchTeam(input);
                if (!t) { statusEl.textContent = "Team not found."; statusEl.style.color = "#f87171"; return; }
                teamId   = t.id;
                teamName = t.shortDisplayName || t.displayName;
                localStorage.setItem("eink_team_id",   teamId);
                localStorage.setItem("eink_team_name", teamName);
                publishConfig({ team: teamName, league: teamLeague });
                statusEl.textContent = `Found: ${t.displayName}`;
                statusEl.style.color = "#4ade80";
                fetchTeamGames();
            } catch(e) {
                statusEl.textContent = "Error reaching ESPN.";
                statusEl.style.color = "#f87171";
            }
        });

        // ---- Init ----
        teamId   = localStorage.getItem("eink_team_id")   || null;
        teamName = localStorage.getItem("eink_team_name") || "";
        if (teamName) document.getElementById("team-name-display").textContent = teamName;
        getLocation();
        fetchCommute();
        if (teamId) fetchTeamGames();
        renderEink();
        setInterval(tick, 1000);
        setInterval(() => {
            if (coords) fetchWeather(coords.lat, coords.lon);
            fetchCommute();
            if (teamId) fetchTeamGames();
        }, 10 * 60 * 1000);
    </script>
</body>
