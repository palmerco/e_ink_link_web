<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-ink Link</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #111;
        }

        #status {
            font-size: 0.85rem;
            margin-bottom: 24px;
            padding: 6px 10px;
            border-radius: 6px;
            background: #f5f5f5;
            color: #555;
        }

        #status.connected { background: #e6f4ea; color: #2d7a3a; }
        #status.error     { background: #fdecea; color: #c0392b; }

        textarea {
            width: 100%;
            height: 140px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: #555; }

        .meta {
            display: flex;
            justify-content: flex-end;
            font-size: 0.8rem;
            color: #999;
            margin-top: 6px;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) { background: #333; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <h1>e-ink Link</h1>
        <div id="status">Connecting...</div>
        <textarea id="message" placeholder="Type your message..." maxlength="300"></textarea>
        <div class="meta"><span id="char-count">0 / 300</span></div>
        <button id="send" disabled>Send to Display</button>
    </div>

    <script>
        // Must match the topic in main.cpp
        const TOPIC = "e_ink_link/message/675072780505b8dc19b65928";

        const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
            clientId: "e_ink_web_" + Math.random().toString(16).slice(2, 8)
        });

        const statusEl   = document.getElementById("status");
        const sendBtn    = document.getElementById("send");
        const msgInput   = document.getElementById("message");
        const charCount  = document.getElementById("char-count");

        client.on("connect", () => {
            statusEl.textContent = "Connected";
            statusEl.className = "connected";
            sendBtn.disabled = false;
        });

        client.on("error", () => {
            statusEl.textContent = "Connection error";
            statusEl.className = "error";
            sendBtn.disabled = true;
        });

        client.on("close", () => {
            statusEl.textContent = "Disconnected -- reconnecting...";
            statusEl.className = "";
            sendBtn.disabled = true;
        });

        msgInput.addEventListener("input", () => {
            charCount.textContent = `${msgInput.value.length} / 300`;
        });

        sendBtn.addEventListener("click", () => {
            const msg = msgInput.value.trim();
            if (!msg) return;
            client.publish(TOPIC, msg);
            msgInput.value = "";
            charCount.textContent = "0 / 300";
        });
    </script>
</body>
</html>
