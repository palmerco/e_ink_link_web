<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kin</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 28px 16px;
        }

        .page {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 { font-size: 1rem; font-weight: 600; color: #111; letter-spacing: 0.02em; }

        #status {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: #e5e5e5;
            color: #777;
        }
        #status.connected { background: #e6f4ea; color: #2d7a3a; }
        #status.error     { background: #fdecea; color: #c0392b; }

        /* Template picker */
        .tpl-picker {
            display: flex;
            gap: 8px;
        }

        .tpl-btn {
            width: 56px;
            height: 42px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            padding: 5px;
            transition: border-color 0.15s;
            flex-shrink: 0;
        }
        .tpl-btn.active       { border-color: #111; }
        .tpl-btn:hover:not(.active) { border-color: #999; }
        .tpl-btn svg          { width: 100%; height: 100%; display: block; }

        /* Preview */
        .preview-wrap {
            position: relative;
            border: 2px solid #bbb;
            border-radius: 6px;
            overflow: hidden;
            background: white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .canvas-overlay-btn {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(0,0,0,0.45);
            color: white;
            border: none;
            font-size: 0.8rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s;
            z-index: 10;
        }
        .canvas-overlay-btn:hover:not(:disabled) { background: rgba(0,0,0,0.7); }
        .canvas-overlay-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #clear-all-btn { top: 6px; right: 6px; }

        #undo-btn {
            top: 6px;
            left: 6px;
            display: none;
        }
        #undo-btn.visible { display: flex; }

        #preview {
            display: block;
            width: 100%;
            height: auto;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .pill {
            padding: 6px 13px;
            font-size: 0.8rem;
            background: #e8e8e8;
            color: #444;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.12s;
        }
        .pill.active { background: #111; color: white; }
        .pill:hover:not(.active):not(:disabled) { background: #ddd; }

        .icon-btn {
            padding: 5px 10px;
            font-size: 0.78rem;
            background: #efefef;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.12s;
        }
        .icon-btn.active { background: #111; color: white; border-color: #111; }
        .icon-btn:hover:not(.active) { background: #e2e2e2; }

        input[type=range] {
            flex: 1;
            accent-color: #111;
            min-width: 0;
        }

        #caption-row { gap: 7px; }
        #caption-row.hidden { display: none; }

        .caption-wrap {
            flex: 1;
            min-width: 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: border-color 0.2s;
        }
        .caption-wrap:focus-within { border-color: #555; }

        .caption-toolbar {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 4px 6px;
            border-bottom: 1px solid #eee;
            background: #f7f7f7;
        }

        #font-select {
            font-size: 0.75rem;
            font-family: inherit;
            border: none;
            background: transparent;
            color: #444;
            cursor: pointer;
            outline: none;
            padding: 2px 2px;
        }

        .cap-tool-btn {
            padding: 2px 6px;
            font-size: 0.78rem;
            border: none;
            background: transparent;
            border-radius: 4px;
            color: #444;
            cursor: pointer;
            line-height: 1.4;
            transition: background 0.1s;
        }
        .cap-tool-btn:hover:not(:disabled) { background: #e2e2e2; }
        .cap-tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .cap-tool-btn.active { background: #d0d0d0; font-weight: 700; }

        .caption-body { position: relative; }

        #caption {
            width: 100%;
            padding: 7px 10px 20px 10px;
            border: none;
            outline: none;
            font-size: 0.88rem;
            font-family: inherit;
            resize: none;
            height: 52px;
            background: transparent;
            box-sizing: border-box;
        }

        #char-counter {
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 0.65rem;
            color: #bbb;
            pointer-events: none;
            user-select: none;
        }
        #char-counter.warn { color: #e07b00; }
        #char-counter.over { color: #c0392b; font-weight: 600; }

        #send {
            width: 100%;
            padding: 11px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        #send:hover:not(:disabled) { background: #333; }
        #send:disabled { background: #ccc; cursor: not-allowed; }

        #img-sliders { gap: 7px; }
        #img-sliders.hidden { display: none; }
        #img-sliders label { font-size: 0.75rem; color: #666; white-space: nowrap; }
        #style-row.hidden { display: none; }

        #file-input  { display: none; }
        #draw-source { display: none; }
    </style>
</head>
<body>
<div class="page">
    <header>
        <img src="kin_logo.png" alt="Kin" style="height:32px;">
        <div id="status">Connecting...</div>
    </header>

    <!-- Template picker -->
    <div class="tpl-picker">
        <!-- T0: full screen -->
        <button class="tpl-btn active" data-tpl="0" title="Full screen">
            <svg viewBox="0 0 44 33" fill="none">
                <rect x=".5" y=".5" width="43" height="32" rx="2" fill="#c8c8c8" stroke="#bbb"/>
            </svg>
        </button>
        <!-- T1: image top, caption bottom -->
        <button class="tpl-btn" data-tpl="1" title="Image top, caption bottom">
            <svg viewBox="0 0 44 33" fill="none">
                <rect x=".5" y=".5" width="43" height="32" rx="2" fill="#e0e0e0" stroke="#bbb"/>
                <rect x=".5" y=".5" width="43" height="21" rx="2" fill="#c8c8c8"/>
                <line x1="0" y1="21.5" x2="44" y2="21.5" stroke="#bbb"/>
            </svg>
        </button>
        <!-- T2: image left, caption right -->
        <button class="tpl-btn" data-tpl="2" title="Image left, caption right">
            <svg viewBox="0 0 44 33" fill="none">
                <rect x=".5" y=".5" width="43" height="32" rx="2" fill="#e0e0e0" stroke="#bbb"/>
                <rect x=".5" y=".5" width="28" height="32" rx="2" fill="#c8c8c8"/>
                <line x1="28.5" y1="0" x2="28.5" y2="33" stroke="#bbb"/>
            </svg>
        </button>
    </div>

    <!-- Preview canvas (also the draw surface) -->
    <div class="preview-wrap">
        <canvas id="preview" width="400" height="300"></canvas>
        <button id="undo-btn"      class="canvas-overlay-btn visible" title="Undo (Ctrl+Z)" disabled><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,1.5 1.5,4 4,6.5"/><path d="M1.5 4 Q1.5 11 10.5 11"/></svg></button>
        <button id="clear-all-btn" class="canvas-overlay-btn" title="Clear all">&#x2715;</button>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="row" id="mode-row">
            <button class="pill active" id="mode-draw">Draw</button>
            <button class="pill" id="eraser-btn">Eraser</button>
            <input type="range" id="brush-size" min="2" max="30" value="6" style="flex:1">
            <button class="pill" id="mode-upload">Upload</button>
            <input type="file" id="file-input" accept="image/*">
            <button class="icon-btn" id="clear-btn">Clear</button>
        </div>

        <div class="row hidden" id="img-sliders">
            <label>Brightness</label>
            <input type="range" id="brightness" min="-100" max="100" value="0">
            <label>Contrast</label>
            <input type="range" id="contrast" min="50" max="300" value="100">
            <button class="icon-btn" id="auto-btn">Auto</button>
        </div>
        <div class="row hidden" id="style-row">
            <button class="icon-btn" data-dither="fs">Floyd-S</button>
            <button class="icon-btn active" data-dither="atkinson">Atkinson</button>
            <button class="icon-btn" data-dither="bayer">Bayer</button>
        </div>

        <div class="row" id="caption-row">
            <div class="caption-wrap">
                <div class="caption-toolbar">
                    <select id="font-select">
                        <option value="sans">Sans</option>
                        <option value="serif">Serif</option>
                        <option value="mono">Mono</option>
                        <option value="impact">Impact</option>
                    </select>
                    <button class="cap-tool-btn" id="bold-btn" title="Bold">B</button>
                    <button class="cap-tool-btn" id="size-up"   title="Increase font size"><span style="font-size:1rem;font-weight:600">A</span><span style="font-size:0.5rem;vertical-align:super">▲</span></button>
                    <button class="cap-tool-btn" id="size-down" title="Decrease font size"><span style="font-size:0.75rem;font-weight:600">A</span><span style="font-size:0.5rem;vertical-align:super">▼</span></button>
                </div>
                <div class="caption-body">
                    <textarea id="caption" placeholder="Caption..."></textarea>
                    <span id="char-counter"></span>
                </div>
            </div>
        </div>

        <button id="send" disabled>Send Reach</button>
    </div>
</div>

<!-- Hidden canvas stores the image/draw zone content at full 400x300 -->
<canvas id="draw-source" width="400" height="300"></canvas>

<script>
    const TOPIC        = "kin/message/675072780505b8dc19b65928";
    const CHUNK_BYTES  = 3000;
    const TOTAL_CHUNKS = 5;

    const splits    = [null, 220, 280];
    const SPLIT_MIN = [null, 80,  100];
    const SPLIT_MAX = [null, 240, 320];

    function getTemplate(idx) {
        if (idx === 0) {
            // Full screen -- caption centered over image, no partition
            return { img: {x:0, y:0, w:400, h:300}, cap: {x:0, y:0, w:400, h:300, overlay:true} };
        }
        if (idx === 1) {
            const y = splits[1];
            return { img: {x:0, y:0, w:400, h:y}, cap: {x:0, y:y+1, w:400, h:300-y-1} };
        }
        if (idx === 2) {
            const x = splits[2];
            return { img: {x:0, y:0, w:x, h:300}, cap: {x:x+1, y:0, w:400-x-1, h:300} };
        }
        return { img: {x:0, y:0, w:400, h:300}, cap: {x:0, y:250, w:400, h:50, overlay:true} };
    }

    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
        clientId: "kin_web_" + Math.random().toString(16).slice(2, 8)
    });

    const statusEl  = document.getElementById("status");
    const sendBtn   = document.getElementById("send");
    const preview   = document.getElementById("preview");
    const pCtx      = preview.getContext("2d");
    const drawSrc   = document.getElementById("draw-source");
    const dCtx      = drawSrc.getContext("2d");
    const captionEl = document.getElementById("caption");
    const fileInput = document.getElementById("file-input");
    const eraserBtn   = document.getElementById("eraser-btn");
    const brushSize   = document.getElementById("brush-size");
    const clearBtn    = document.getElementById("clear-btn");
    const imgSliders   = document.getElementById("img-sliders");
    const brightnessEl = document.getElementById("brightness");
    const contrastEl   = document.getElementById("contrast");
    const autoBtn      = document.getElementById("auto-btn");
    const styleRow     = document.getElementById("style-row");
    const undoBtn      = document.getElementById("undo-btn");

    let autoBrightness = 0;
    let autoContrast   = 100;
    let ditherStyle    = "atkinson";

    const FONTS = {
        sans:   { family: "system-ui, sans-serif",   weight: "normal" },
        serif:  { family: "Georgia, serif",           weight: "normal" },
        mono:   { family: "'Courier New', monospace", weight: "normal" },
        impact: { family: "Impact, sans-serif",       weight: "normal" },
    };
    let captionFont    = "sans";
    let captionBold    = false;
    const SIZE_STEPS   = [11, 13, 15, 17, 19, 21, 24, 28, 32];
    let sizeIdx        = 3; // default 17px

    function getEffectiveFontSize(text, zoneH) {
        return Math.min(SIZE_STEPS[sizeIdx], Math.floor(zoneH / 1.45));
    }

    function updateSizeBtns() {
        document.getElementById("size-up").disabled   = sizeIdx >= SIZE_STEPS.length - 1;
        document.getElementById("size-down").disabled = sizeIdx <= 0;
    }

    // Calculates how many characters fit in the caption zone with current font/size
    function calcMaxChars() {
        const tpl = getTemplate(currentTpl);
        if (!tpl.cap) return 200;
        const { w, h } = tpl.cap;
        const fontSize = Math.min(SIZE_STEPS[sizeIdx], Math.floor(h / 1.45));
        const lineH    = fontSize * 1.45;
        const maxLines = Math.max(1, Math.floor(h / lineH));
        const tmp    = document.createElement("canvas").getContext("2d");
        const f      = FONTS[captionFont];
        const weight = captionBold ? "bold" : f.weight;
        tmp.font     = `${weight} ${fontSize}px ${f.family}`;
        const avgCharW   = tmp.measureText("ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 ").width / 63;
        const charsPerLine = Math.max(5, Math.floor((w - 16) / avgCharW));
        return maxLines * charsPerLine;
    }

    function updateCharLimit() {
        const max     = calcMaxChars();
        const current = captionEl.value.length;
        const counter = document.getElementById("char-counter");
        const left    = max - current;
        counter.textContent = `${current}/${max}`;
        counter.className   = left < 0 ? "over" : left < Math.ceil(max * 0.15) ? "warn" : "";
        // Apply the font to the textarea as a live preview
        const f = FONTS[captionFont];
        captionEl.style.fontFamily = f.family;
        captionEl.style.fontWeight = captionBold ? "700" : f.weight;
        captionEl.style.fontSize   = SIZE_STEPS[sizeIdx] + "px";
    }

    // ---- Undo ----
    const undoStack = [];
    const MAX_UNDO  = 12;

    function pushUndo() {
        undoStack.push(dCtx.getImageData(0, 0, 400, 300));
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        undoBtn.disabled = false;
    }
    function undo() {
        if (!undoStack.length) return;
        dCtx.putImageData(undoStack.pop(), 0, 0);
        undoBtn.disabled = undoStack.length === 0;
        compose();
    }
    undoBtn.addEventListener("click", undo);
    document.addEventListener("keydown", e => {
        if ((e.ctrlKey || e.metaKey) && e.key === "z") { e.preventDefault(); undo(); }
    });

    // ---- Pan / zoom (upload mode) ----
    let imgPan  = {x: 0, y: 0};
    let imgZoom = 1.0;
    let isPanning    = false;
    let isPinching   = false;
    let panStart     = null;
    let pinchStart   = null;

    // 4x4 Bayer ordered dither matrix, thresholds in 0-255 range
    const BAYER = [0,8,2,10, 12,4,14,6, 3,11,1,9, 15,7,13,5].map(v => (v + 0.5) / 16 * 255);

    let currentTpl = 0;
    let mode       = "draw";
    let drawTool   = "pen";
    let isDrawing       = false;
    let isDraggingSplit = false;
    let lastDX = 0, lastDY = 0;
    let rawGray       = null;  // Float32Array -- auto-leveled gray for current zone size
    let originalImage = null;  // HTMLImageElement -- stored so we can re-render on template switch

    // Init draw source white
    dCtx.fillStyle = "#fff";
    dCtx.fillRect(0, 0, 400, 300);

    // ---- MQTT ----
    client.on("connect", () => {
        statusEl.textContent = "Connected";
        statusEl.className   = "connected";
        sendBtn.disabled     = false;
    });
    client.on("error", () => {
        statusEl.textContent = "Error";
        statusEl.className   = "error";
        sendBtn.disabled     = true;
    });
    client.on("close", () => {
        statusEl.textContent = "Disconnected";
        statusEl.className   = "";
        sendBtn.disabled     = true;
    });

    // ---- Template ----
    document.querySelectorAll(".tpl-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelector(".tpl-btn.active").classList.remove("active");
            btn.classList.add("active");
            currentTpl = parseInt(btn.dataset.tpl);
            updateCharLimit();
            if (originalImage) {
                processImageFromImg(originalImage); // re-renders into new zone dimensions
            } else {
                dCtx.fillStyle = "#fff";
                dCtx.fillRect(0, 0, 400, 300);
                compose();
            }
        });
    });

    // ---- Mode ----
    document.getElementById("mode-draw").addEventListener("click", () => {
        mode = "draw";
        drawTool = "pen";
        document.getElementById("mode-draw").classList.add("active");
        document.getElementById("mode-upload").classList.remove("active");
        eraserBtn.classList.remove("active");
        imgSliders.classList.add("hidden");
        styleRow.classList.add("hidden");
        rawGray = null;
        undoBtn.classList.add("visible");
        compose();
    });

    document.getElementById("mode-upload").addEventListener("click", () => {
        fileInput.click();
    });

    fileInput.addEventListener("change", () => {
        if (!fileInput.files[0]) return;
        mode = "upload";
        document.getElementById("mode-upload").classList.add("active");
        document.getElementById("mode-draw").classList.remove("active");
        eraserBtn.classList.remove("active");
        undoBtn.classList.remove("visible");
        processImage(fileInput.files[0]);
        fileInput.value = "";
    });


    function processImageFromImg(img) {
        const iz = getTemplate(currentTpl).img;

        // Draw into offscreen canvas at current image zone size, respecting pan/zoom
        const off = document.createElement("canvas");
        off.width = iz.w; off.height = iz.h;
        const oc = off.getContext("2d");
        oc.fillStyle = "#fff";
        oc.fillRect(0, 0, iz.w, iz.h);
        const baseScale = Math.min(iz.w / img.width, iz.h / img.height);
        const scale = baseScale * imgZoom;
        const sw = img.width * scale, sh = img.height * scale;
        oc.drawImage(img, (iz.w - sw) / 2 + imgPan.x, (iz.h - sh) / 2 + imgPan.y, sw, sh);

        // Convert to grayscale
        const pixels = oc.getImageData(0, 0, iz.w, iz.h).data;
        const g = new Float32Array(iz.w * iz.h);
        for (let i = 0; i < g.length; i++) {
            const p = i * 4;
            g[i] = 0.299 * pixels[p] + 0.587 * pixels[p+1] + 0.114 * pixels[p+2];
        }

        // Percentile-clip auto-levels
        const hist = new Int32Array(256);
        for (let i = 0; i < g.length; i++) hist[Math.round(g[i])]++;
        const clip = Math.floor(g.length * 0.01);
        let lo = 0, cumLo = 0;
        while (lo < 255 && cumLo + hist[lo] < clip) { cumLo += hist[lo++]; }
        let hi = 255, cumHi = 0;
        while (hi > 0   && cumHi + hist[hi] < clip) { cumHi += hist[hi--]; }
        const range = (hi - lo) || 1;
        rawGray = new Float32Array(g.length);
        for (let i = 0; i < g.length; i++)
            rawGray[i] = Math.max(0, Math.min(255, (g[i] - lo) / range * 255));

        computeAutoSettings();
        brightnessEl.value = autoBrightness;
        contrastEl.value   = autoContrast;
        imgSliders.classList.remove("hidden");
        styleRow.classList.remove("hidden");
        applyAndPreview();
    }

    function processImage(file) {
        const img = new Image();
        img.onload = () => {
            URL.revokeObjectURL(img.src);
            originalImage = img;
            imgPan  = {x: 0, y: 0};
            imgZoom = 1.0;
            processImageFromImg(img);
        };
        img.src = URL.createObjectURL(file);
    }

    // Fast color preview during pan/zoom gesture -- no dithering
    function quickPreview() {
        if (!originalImage) return;
        const iz = getTemplate(currentTpl).img;
        const baseScale = Math.min(iz.w / originalImage.width, iz.h / originalImage.height);
        const scale = baseScale * imgZoom;
        const sw = originalImage.width * scale, sh = originalImage.height * scale;
        dCtx.fillStyle = "#fff";
        dCtx.fillRect(iz.x, iz.y, iz.w, iz.h);
        dCtx.drawImage(originalImage,
            iz.x + (iz.w - sw) / 2 + imgPan.x,
            iz.y + (iz.h - sh) / 2 + imgPan.y,
            sw, sh);
        compose();
    }

    brightnessEl.addEventListener("input", () => { if (rawGray) applyAndPreview(); });
    contrastEl.addEventListener("input",   () => { if (rawGray) applyAndPreview(); });
    document.getElementById("clear-all-btn").addEventListener("click", () => {
        // Full reset -- clear undo history too
        undoStack.length = 0;
        undoBtn.disabled = true;
        rawGray = null;
        originalImage = null;
        imgPan  = {x: 0, y: 0};
        imgZoom = 1.0;
        dCtx.fillStyle = "#fff";
        dCtx.fillRect(0, 0, 400, 300);
        imgSliders.classList.add("hidden");
        styleRow.classList.add("hidden");
        mode = "draw";
        drawTool = "pen";
        document.getElementById("mode-draw").classList.add("active");
        document.getElementById("mode-upload").classList.remove("active");
        eraserBtn.classList.remove("active");
        undoBtn.classList.add("visible");
        compose();
    });

    autoBtn.addEventListener("click", () => {
        brightnessEl.value = autoBrightness;
        contrastEl.value   = autoContrast;
        applyAndPreview();
    });

    styleRow.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
            styleRow.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            ditherStyle = btn.dataset.dither;
            if (rawGray) applyAndPreview();
        });
    });

    document.getElementById("font-select").addEventListener("change", e => {
        captionFont = e.target.value;
        updateCharLimit();
        compose();
    });

    document.getElementById("size-up").addEventListener("click", () => {
        if (sizeIdx < SIZE_STEPS.length - 1) { sizeIdx++; updateSizeBtns(); updateCharLimit(); compose(); }
    });
    document.getElementById("size-down").addEventListener("click", () => {
        if (sizeIdx > 0) { sizeIdx--; updateSizeBtns(); updateCharLimit(); compose(); }
    });
    document.getElementById("bold-btn").addEventListener("click", () => {
        captionBold = !captionBold;
        document.getElementById("bold-btn").classList.toggle("active", captionBold);
        captionEl.style.fontWeight = captionBold ? "700" : FONTS[captionFont].weight;
        updateCharLimit();
        compose();
    });

    function computeAutoSettings() {
        const n = rawGray.length;
        let sum = 0;
        for (let i = 0; i < n; i++) sum += rawGray[i];
        const mean = sum / n;

        let variance = 0;
        for (let i = 0; i < n; i++) variance += (rawGray[i] - mean) ** 2;
        const std = Math.sqrt(variance / n);

        // Target 148 instead of 128 -- e-ink black absorbs more light than
        // pixels emit, so dithered images appear darker on the physical display
        autoBrightness = Math.round(Math.max(-100, Math.min(100, 148 - mean)));

        // Target std dev of 70 -- boost flat images, pull back already punchy ones
        const mult = std > 0 ? Math.min(2.5, Math.max(0.7, 70 / std)) : 1.0;
        autoContrast = Math.round(Math.max(50, Math.min(300, mult * 100)));
    }

    function applyAndPreview() {
        const iz         = getTemplate(currentTpl).img;
        const brightness = parseInt(brightnessEl.value);
        const contrast   = contrastEl.value / 100;

        const adjusted = new Float32Array(rawGray.length);
        for (let i = 0; i < rawGray.length; i++) {
            adjusted[i] = Math.max(0, Math.min(255,
                (rawGray[i] - 128) * contrast + 128 + brightness));
        }

        if (ditherStyle === "fs") {
            // Floyd-Steinberg -- full error diffusion, rich detail
            for (let y = 0; y < iz.h; y++) {
                for (let x = 0; x < iz.w; x++) {
                    const idx = y * iz.w + x;
                    const old = adjusted[idx];
                    const nw  = old < 128 ? 0 : 255;
                    const err = old - nw;
                    adjusted[idx] = nw;
                    if (x + 1 < iz.w)         adjusted[idx + 1]           += err * 7 / 16;
                    if (y + 1 < iz.h) {
                        if (x - 1 >= 0)       adjusted[idx + iz.w - 1]   += err * 3 / 16;
                                              adjusted[idx + iz.w]        += err * 5 / 16;
                        if (x + 1 < iz.w)     adjusted[idx + iz.w + 1]   += err * 1 / 16;
                    }
                }
            }
        } else if (ditherStyle === "atkinson") {
            // Atkinson -- 6/8 error diffusion, cleaner highlights
            for (let y = 0; y < iz.h; y++) {
                for (let x = 0; x < iz.w; x++) {
                    const idx = y * iz.w + x;
                    const old = adjusted[idx];
                    const nw  = old < 128 ? 0 : 255;
                    const err = Math.floor((old - nw) / 8);
                    adjusted[idx] = nw;
                    if (x + 1 < iz.w)         adjusted[idx + 1]           += err;
                    if (x + 2 < iz.w)         adjusted[idx + 2]           += err;
                    if (y + 1 < iz.h) {
                        if (x - 1 >= 0)       adjusted[idx + iz.w - 1]   += err;
                                              adjusted[idx + iz.w]        += err;
                        if (x + 1 < iz.w)     adjusted[idx + iz.w + 1]   += err;
                    }
                    if (y + 2 < iz.h)         adjusted[idx + iz.w * 2]   += err;
                }
            }
        } else {
            // Bayer ordered -- regular grid pattern, no error diffusion
            for (let y = 0; y < iz.h; y++) {
                for (let x = 0; x < iz.w; x++) {
                    const idx = y * iz.w + x;
                    adjusted[idx] = adjusted[idx] > BAYER[(y % 4) * 4 + (x % 4)] ? 255 : 0;
                }
            }
        }

        // Paint dithered result into draw source at image zone offset
        dCtx.fillStyle = "#fff";
        dCtx.fillRect(iz.x, iz.y, iz.w, iz.h);
        const imgData = dCtx.createImageData(iz.w, iz.h);
        for (let i = 0; i < adjusted.length; i++) {
            const v = adjusted[i] >= 128 ? 255 : 0;
            imgData.data[i * 4]     = v;
            imgData.data[i * 4 + 1] = v;
            imgData.data[i * 4 + 2] = v;
            imgData.data[i * 4 + 3] = 255;
        }
        dCtx.putImageData(imgData, iz.x, iz.y);
        compose();
    }

    // ---- Draw ----
    function clientToCanvas(clientX, clientY) {
        const rect = preview.getBoundingClientRect();
        return [
            (clientX - rect.left) * (400 / rect.width),
            (clientY - rect.top)  * (300 / rect.height)
        ];
    }
    function canvasCoords(e) {
        const src = e.touches ? e.touches[0] : e;
        return clientToCanvas(src.clientX, src.clientY);
    }

    // Zoom image around a canvas point (cx, cy), keeping that point fixed
    function zoomAround(newZoom, cx, cy) {
        const iz   = getTemplate(currentTpl).img;
        const oldZ = imgZoom;
        newZoom    = Math.max(0.5, Math.min(5.0, newZoom));
        const dx   = cx - iz.x - iz.w / 2;
        const dy   = cy - iz.y - iz.h / 2;
        imgPan.x   = dx - (dx - imgPan.x) * newZoom / oldZ;
        imgPan.y   = dy - (dy - imgPan.y) * newZoom / oldZ;
        imgZoom    = newZoom;
    }

    // Debounce full re-render after scroll/pinch settles
    let zoomTimer = null;
    function scheduleRerender() {
        clearTimeout(zoomTimer);
        zoomTimer = setTimeout(() => {
            if (originalImage) processImageFromImg(originalImage);
        }, 350);
    }

    // Mouse wheel crop in/out
    preview.addEventListener("wheel", e => {
        if (mode !== "upload" || !originalImage) return;
        e.preventDefault();
        const [cx, cy] = canvasCoords(e);
        if (!inImageZone(cx, cy)) return;
        const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
        zoomAround(imgZoom * factor, cx, cy);
        quickPreview();
        scheduleRerender();
    }, { passive: false });

    function inImageZone(cx, cy) {
        const iz = getTemplate(currentTpl).img;
        return cx >= iz.x && cx <= iz.x + iz.w && cy >= iz.y && cy <= iz.y + iz.h;
    }

    function drawDot(x, y) {
        dCtx.beginPath();
        dCtx.arc(x, y, parseInt(brushSize.value) / 2, 0, Math.PI * 2);
        dCtx.fillStyle = drawTool === "pen" ? "#000" : "#fff";
        dCtx.fill();
    }

    function drawLine(x1, y1, x2, y2) {
        dCtx.beginPath();
        dCtx.moveTo(x1, y1);
        dCtx.lineTo(x2, y2);
        dCtx.strokeStyle = drawTool === "pen" ? "#000" : "#fff";
        dCtx.lineWidth   = parseInt(brushSize.value);
        dCtx.lineCap     = "round";
        dCtx.lineJoin    = "round";
        dCtx.stroke();
    }

    function nearSplit(cx, cy) {
        if (currentTpl === 0) return false;
        if (currentTpl === 1) return Math.abs(cy - splits[1]) < 8;
        if (currentTpl === 2) return Math.abs(cx - splits[2]) < 8;
        return false;
    }

    function splitCursor() {
        return currentTpl === 1 ? "ns-resize" : "ew-resize";
    }

    let isMousePanning = false;
    let mousePanStart  = null;

    function onPointerStart(e) {
        e.preventDefault();
        const [x, y] = canvasCoords(e);
        if (nearSplit(x, y)) {
            isDraggingSplit = true;
            return;
        }
        if (mode === "upload" && originalImage && inImageZone(x, y)) {
            isMousePanning = true;
            mousePanStart  = { cx: e.clientX, cy: e.clientY, panX: imgPan.x, panY: imgPan.y };
            preview.style.cursor = "grabbing";
            return;
        }
        if (mode !== "draw") return;
        if (!inImageZone(x, y)) return;
        pushUndo();
        isDrawing = true;
        [lastDX, lastDY] = [x, y];
        drawDot(x, y);
        compose();
    }

    function onPointerMove(e) {
        e.preventDefault();
        const [x, y] = canvasCoords(e);
        if (isDraggingSplit) {
            const val = currentTpl === 0 ? y : x;
            splits[currentTpl] = Math.max(SPLIT_MIN[currentTpl], Math.min(SPLIT_MAX[currentTpl], Math.round(val)));
            compose();
            preview.style.cursor = splitCursor();
            return;
        }
        if (isMousePanning) {
            const rect = preview.getBoundingClientRect();
            imgPan.x = mousePanStart.panX + (e.clientX - mousePanStart.cx) * (400 / rect.width);
            imgPan.y = mousePanStart.panY + (e.clientY - mousePanStart.cy) * (300 / rect.height);
            quickPreview();
            return;
        }
        if (!isDrawing || mode !== "draw") return;
        drawLine(lastDX, lastDY, x, y);
        [lastDX, lastDY] = [x, y];
        compose();
    }

    function onPointerEnd() {
        isDraggingSplit = false;
        isDrawing = false;
        if (isMousePanning) {
            isMousePanning = false;
            preview.style.cursor = "grab";
            if (originalImage) processImageFromImg(originalImage);
        }
    }

    preview.addEventListener("mousedown",  onPointerStart);
    preview.addEventListener("mousemove",  onPointerMove);
    preview.addEventListener("mouseup",    onPointerEnd);
    preview.addEventListener("mouseleave", onPointerEnd);

    // Touch -- handles pinch-zoom and pan in upload mode, drawing otherwise
    function getTouchDist(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    preview.addEventListener("touchstart", e => {
        e.preventDefault();
        if (mode === "upload" && originalImage) {
            const rect = preview.getBoundingClientRect();
            if (e.touches.length === 2) {
                isPinching = true;
                isPanning  = false;
                const [mx, my] = clientToCanvas(
                    (e.touches[0].clientX + e.touches[1].clientX) / 2,
                    (e.touches[0].clientY + e.touches[1].clientY) / 2
                );
                pinchStart = {
                    dist: getTouchDist(e.touches),
                    zoom: imgZoom,
                    panX: imgPan.x,
                    panY: imgPan.y,
                    midX: mx, midY: my
                };
                return;
            }
            if (e.touches.length === 1) {
                const [cx, cy] = canvasCoords(e);
                if (!nearSplit(cx, cy) && inImageZone(cx, cy)) {
                    isPanning = true;
                    panStart  = {
                        cx: e.touches[0].clientX,
                        cy: e.touches[0].clientY,
                        panX: imgPan.x,
                        panY: imgPan.y
                    };
                    return;
                }
            }
        }
        onPointerStart(e);
    }, { passive: false });

    preview.addEventListener("touchmove", e => {
        e.preventDefault();
        if (mode === "upload" && originalImage) {
            if (isPinching && e.touches.length === 2) {
                const newDist  = getTouchDist(e.touches);
                const newZoom  = pinchStart.zoom * (newDist / pinchStart.dist);
                // Restore pan to start state, then apply centered zoom
                imgPan.x = pinchStart.panX;
                imgPan.y = pinchStart.panY;
                imgZoom  = pinchStart.zoom;
                zoomAround(newZoom, pinchStart.midX, pinchStart.midY);
                quickPreview();
                return;
            }
            if (isPanning && e.touches.length === 1) {
                const rect = preview.getBoundingClientRect();
                imgPan.x = panStart.panX + (e.touches[0].clientX - panStart.cx) * (400 / rect.width);
                imgPan.y = panStart.panY + (e.touches[0].clientY - panStart.cy) * (300 / rect.height);
                quickPreview();
                return;
            }
        }
        onPointerMove(e);
    }, { passive: false });

    preview.addEventListener("touchend", e => {
        if (isPinching || isPanning) {
            isPinching = false;
            isPanning  = false;
            // Full re-render with dithering now that gesture is done
            if (originalImage) processImageFromImg(originalImage);
            return;
        }
        onPointerEnd(e);
    });

    preview.addEventListener("mousemove", e => {
        if (isMousePanning) return; // cursor already set to grabbing
        const [x, y] = canvasCoords(e);
        if (nearSplit(x, y))                                        { preview.style.cursor = splitCursor(); return; }
        if (mode === "upload" && originalImage && inImageZone(x, y)){ preview.style.cursor = "grab";        return; }
        if (mode === "draw"   && inImageZone(x, y))                 { preview.style.cursor = "crosshair";   return; }
        preview.style.cursor = "default";
    });

    eraserBtn.addEventListener("click", () => {
        mode = "draw";
        drawTool = "eraser";
        eraserBtn.classList.add("active");
        document.getElementById("mode-draw").classList.remove("active");
        document.getElementById("mode-upload").classList.remove("active");
        imgSliders.classList.add("hidden");
        styleRow.classList.add("hidden");
        rawGray = null;
        undoBtn.classList.add("visible");
    });
    clearBtn.addEventListener("click", () => {
        pushUndo();
        const iz = getTemplate(currentTpl).img;
        dCtx.fillStyle = "#fff";
        dCtx.fillRect(iz.x, iz.y, iz.w, iz.h);
        compose();
    });

    captionEl.addEventListener("input", () => { updateCharLimit(); compose(); });

    // ---- Compose preview ----
    function renderCaption(text, targetCtx, zone) {
        if (!zone) return;
        const { x, y, w, h } = zone;
        if (w < 20 || h < 20) return;
        targetCtx.save();
        targetCtx.beginPath();
        targetCtx.rect(x, y, w, h);
        targetCtx.clip();
        if (!text) { targetCtx.restore(); return; }

        const fontSize = getEffectiveFontSize(text, h);
        const f      = FONTS[captionFont];
        const weight = captionBold ? "bold" : f.weight;
        targetCtx.font = `${weight} ${fontSize}px ${f.family}`;
        targetCtx.fillStyle     = "#000";
        targetCtx.textBaseline  = "middle";
        targetCtx.textAlign     = "center";

        const words = text.split(" ");
        const lines = [];
        let line = "";
        for (const word of words) {
            const test = line ? line + " " + word : word;
            if (targetCtx.measureText(test).width > w - 16 && line) {
                lines.push(line); line = word;
            } else { line = test; }
        }
        if (line) lines.push(line);

        const lineH  = fontSize * 1.45;
        const startY = y + (h - lines.length * lineH) / 2 + lineH / 2;
        lines.forEach((l, i) => targetCtx.fillText(l, x + w / 2, startY + i * lineH));
        targetCtx.restore();
    }

    function compose(forSend = false) {
        const tpl = getTemplate(currentTpl);
        const iz  = tpl.img;

        pCtx.fillStyle = "#fff";
        pCtx.fillRect(0, 0, 400, 300);

        // Image / draw zone
        pCtx.drawImage(drawSrc, iz.x, iz.y, iz.w, iz.h, iz.x, iz.y, iz.w, iz.h);

        // Caption zone
        if (tpl.cap) {
            const cz = tpl.cap;
            if (cz.overlay) {
                // Overlay -- caption centered over image, no background
                if (captionEl.value.trim()) {
                    renderCaption(captionEl.value, pCtx, cz);
                }
            } else {
                pCtx.fillStyle = "#fff";
                pCtx.fillRect(cz.x, cz.y, cz.w, cz.h);
                pCtx.strokeStyle = "#000";
                pCtx.lineWidth = 1;
                pCtx.beginPath();
                if (cz.y > 0) {
                    pCtx.moveTo(0, cz.y); pCtx.lineTo(400, cz.y);
                } else {
                    pCtx.moveTo(cz.x, 0); pCtx.lineTo(cz.x, 300);
                }
                pCtx.stroke();
                renderCaption(captionEl.value, pCtx, cz);
            }
        }

        // Zone hint (dashed border) in draw mode, only for live preview
        if (!forSend && mode === "draw") {
            pCtx.save();
            pCtx.setLineDash([4, 4]);
            pCtx.strokeStyle = "rgba(80,80,80,0.25)";
            pCtx.lineWidth = 1;
            pCtx.strokeRect(iz.x + 0.5, iz.y + 0.5, iz.w - 1, iz.h - 1);
            pCtx.restore();
        }
    }

    // ---- Pack & send ----
    function toBase64(buf) {
        let bin = "";
        for (let i = 0; i < buf.length; i++) bin += String.fromCharCode(buf[i]);
        return btoa(bin);
    }

    function packEink(srcCanvas) {
        const pixels = srcCanvas.getContext("2d").getImageData(0, 0, 400, 300).data;
        const buf = new Uint8Array(15000);
        for (let row = 0; row < 300; row++) {
            for (let b = 0; b < 50; b++) {
                let byte = 0;
                for (let bit = 0; bit < 8; bit++) {
                    const p    = (row * 400 + b * 8 + bit) * 4;
                    const gray = 0.299 * pixels[p] + 0.587 * pixels[p+1] + 0.114 * pixels[p+2];
                    if (gray >= 128) byte |= (1 << (7 - bit));
                }
                buf[row * 50 + b] = byte;
            }
        }
        return buf;
    }

    async function sendImage(buf) {
        const b64      = toBase64(buf);
        const origText = sendBtn.textContent;
        sendBtn.disabled = true;
        for (let i = 0; i < TOTAL_CHUNKS; i++) {
            const chunk = b64.slice(i * (CHUNK_BYTES * 4 / 3), (i + 1) * (CHUNK_BYTES * 4 / 3));
            client.publish(TOPIC, `IMG:${String(i+1).padStart(2,"0")}/${TOTAL_CHUNKS}:${chunk}`);
            sendBtn.textContent = `Sending... ${i+1}/${TOTAL_CHUNKS}`;
            await new Promise(r => setTimeout(r, 150));
        }
        sendBtn.textContent = origText;
        sendBtn.disabled    = false;
    }

    sendBtn.addEventListener("click", async () => {
        // Render clean frame (no zone hints) onto offscreen canvas
        const off   = document.createElement("canvas");
        off.width   = 400; off.height = 300;
        const offCtx = off.getContext("2d");
        const tpl   = getTemplate(currentTpl);
        const iz    = tpl.img;

        offCtx.fillStyle = "#fff";
        offCtx.fillRect(0, 0, 400, 300);
        offCtx.drawImage(drawSrc, iz.x, iz.y, iz.w, iz.h, iz.x, iz.y, iz.w, iz.h);

        if (tpl.cap) {
            const cz = tpl.cap;
            if (cz.overlay) {
                if (captionEl.value.trim()) {
                    offCtx.fillStyle = "#fff";
                    offCtx.fillRect(cz.x, cz.y, cz.w, cz.h);
                    offCtx.strokeStyle = "#000";
                    offCtx.lineWidth = 1;
                    offCtx.beginPath();
                    offCtx.moveTo(0, cz.y); offCtx.lineTo(400, cz.y);
                    offCtx.stroke();
                    renderCaption(captionEl.value, offCtx, cz);
                }
            } else {
                offCtx.fillStyle = "#fff";
                offCtx.fillRect(cz.x, cz.y, cz.w, cz.h);
                offCtx.strokeStyle = "#000";
                offCtx.lineWidth = 1;
                offCtx.beginPath();
                if (cz.y > 0) {
                    offCtx.moveTo(0, cz.y); offCtx.lineTo(400, cz.y);
                } else {
                    offCtx.moveTo(cz.x, 0); offCtx.lineTo(cz.x, 300);
                }
                offCtx.stroke();
                renderCaption(captionEl.value, offCtx, cz);
            }
        }

        const buf = packEink(off);
        await sendImage(buf);
        client.publish(TOPIC, "CMD:RETURN");

        const caption = captionEl.value.trim();
        if (caption) client.publish(TOPIC, "TXT:" + caption);
    });

    // Init
    updateSizeBtns();
    updateCharLimit();
    compose();
</script>
</body>
</html>
