<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-ink Link</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 860px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #111;
        }

        #status {
            font-size: 0.85rem;
            margin-bottom: 24px;
            padding: 6px 10px;
            border-radius: 6px;
            background: #f5f5f5;
            color: #555;
        }

        #status.connected { background: #e6f4ea; color: #2d7a3a; }
        #status.error     { background: #fdecea; color: #c0392b; }

        .layout {
            display: flex;
            gap: 28px;
            align-items: flex-start;
        }

        .form-col {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
        }

        .preview-col { flex: 1; }

        .col-label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        /* Drop zone */
        #drop-zone {
            width: 100%;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 16px 12px;
            text-align: center;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 10px;
        }
        #drop-zone:hover, #drop-zone.drag-over {
            border-color: #888;
            background: #f8f8f8;
            color: #555;
        }
        #drop-zone.has-image {
            border-color: #111;
            color: #111;
            background: #f8f8f8;
        }
        #file-input { display: none; }

        #img-controls {
            display: none;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: #555;
        }
        .slider-row label { width: 70px; flex-shrink: 0; }
        .slider-row input[type=range] { flex: 1; }
        .slider-row span { width: 30px; text-align: right; font-size: 0.75rem; color: #999; }

        textarea {
            width: 100%;
            height: 120px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #555; }
        textarea:disabled { background: #f5f5f5; color: #aaa; }

        .meta {
            display: flex;
            justify-content: flex-end;
            font-size: 0.8rem;
            color: #999;
            margin-top: 6px;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background: #333; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Preview */
        .preview-frame {
            border: 3px solid #888;
            border-radius: 4px;
            background: #e8e8e0;
            padding: 6px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
        }

        #preview-canvas {
            display: block;
            width: 100%;
            background: white;
        }

        /* text mode: 300x400 virtual canvas */
        #preview-canvas.text-mode { aspect-ratio: 300 / 400; }
        /* image mode: 400x300 physical display */
        #preview-canvas.image-mode { aspect-ratio: 400 / 300; }

        .preview-dims {
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 5px;
        }

        @media (max-width: 680px) {
            .layout { flex-direction: column; }
            .form-col { flex: none; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>e-ink Link</h1>
        <div id="status">Connecting...</div>
        <div class="layout">
            <div class="form-col">
                <!-- Image drop zone -->
                <div class="col-label">Image</div>
                <div id="drop-zone">Drop image or click to upload</div>
                <input type="file" id="file-input" accept="image/*">
                <div id="img-controls">
                    <div class="slider-row">
                        <label>Brightness</label>
                        <input type="range" id="brightness" min="-100" max="100" value="0">
                        <span id="brightness-val">0</span>
                    </div>
                    <div class="slider-row">
                        <label>Contrast</label>
                        <input type="range" id="contrast" min="50" max="200" value="100">
                        <span id="contrast-val">1.0x</span>
                    </div>
                </div>

                <!-- Text message -->
                <div class="col-label">Message</div>
                <textarea id="message" placeholder="Type your message..."></textarea>
                <div class="meta"><span id="char-count">0 / 300</span></div>
                <button id="send" disabled>Send to Display</button>
            </div>
            <div class="preview-col">
                <div class="col-label">Preview</div>
                <div class="preview-frame">
                    <canvas id="preview-canvas" class="text-mode" width="300" height="400"></canvas>
                </div>
                <div class="preview-dims" id="preview-dims">300 x 400 (text, rotation 1)</div>
            </div>
        </div>
    </div>

    <script>
        const TOPIC       = "e_ink_link/message/675072780505b8dc19b65928";
        const CHUNK_BYTES = 3000;    // raw bytes per chunk
        const TOTAL_CHUNKS = 5;      // 5 x 3000 = 15000 bytes

        const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
            clientId: "e_ink_web_" + Math.random().toString(16).slice(2, 8)
        });

        const statusEl   = document.getElementById("status");
        const sendBtn    = document.getElementById("send");
        const msgInput   = document.getElementById("message");
        const charCount  = document.getElementById("char-count");
        const dropZone   = document.getElementById("drop-zone");
        const fileInput  = document.getElementById("file-input");
        const canvas     = document.getElementById("preview-canvas");
        const ctx        = canvas.getContext("2d");
        const dimsEl     = document.getElementById("preview-dims");

        // ---- MQTT ----
        client.on("connect", () => {
            statusEl.textContent = "Connected";
            statusEl.className = "connected";
            sendBtn.disabled = false;
        });
        client.on("error", () => {
            statusEl.textContent = "Connection error";
            statusEl.className = "error";
            sendBtn.disabled = true;
        });
        client.on("close", () => {
            statusEl.textContent = "Disconnected -- reconnecting...";
            statusEl.className = "";
            sendBtn.disabled = true;
        });

        function setTextMode() {
            canvas.width = 400;
            canvas.height = 300;
            canvas.className = "image-mode";
            dimsEl.textContent = "400 x 300 (image)";
        }

        function setImageMode() {
            canvas.width = 400;
            canvas.height = 300;
            canvas.className = "image-mode";
            dimsEl.textContent = "400 x 300 (image, physical)";
        }

        let lastSent = "";
        let pendingImage = null; // Uint8Array[15000] when image loaded
        let rawGray = null;     // Float32Array[120000] - auto-leveled grayscale

        const brightnessSlider = document.getElementById("brightness");
        const contrastSlider   = document.getElementById("contrast");
        const brightnessVal    = document.getElementById("brightness-val");
        const contrastVal      = document.getElementById("contrast-val");
        const imgControls      = document.getElementById("img-controls");

        brightnessSlider.addEventListener("input", () => {
            brightnessVal.textContent = brightnessSlider.value;
            if (rawGray) applyAndPreview();
        });
        contrastSlider.addEventListener("input", () => {
            contrastVal.textContent = (contrastSlider.value / 100).toFixed(1) + "x";
            if (rawGray) applyAndPreview();
        });

        // Apply brightness/contrast to rawGray, dither, pack 1bpp, update preview
        function applyAndPreview() {
            const brightness = parseInt(brightnessSlider.value);
            const contrast   = contrastSlider.value / 100;
            const adjusted   = new Float32Array(rawGray.length);
            for (let i = 0; i < rawGray.length; i++) {
                adjusted[i] = Math.max(0, Math.min(255,
                    (rawGray[i] - 128) * contrast + 128 + brightness));
            }

            // Floyd-Steinberg dithering on adjusted
            for (let y = 0; y < 300; y++) {
                for (let x = 0; x < 400; x++) {
                    const idx = y * 400 + x;
                    const old = adjusted[idx];
                    const nw  = old < 128 ? 0 : 255;
                    const err = old - nw;
                    adjusted[idx] = nw;
                    if (x + 1 < 400)           adjusted[idx + 1]       += err * 7 / 16;
                    if (y + 1 < 300) {
                        if (x - 1 >= 0)        adjusted[idx + 400 - 1] += err * 3 / 16;
                                               adjusted[idx + 400]     += err * 5 / 16;
                        if (x + 1 < 400)       adjusted[idx + 400 + 1] += err * 1 / 16;
                    }
                }
            }

            // Pack 1bpp
            const buf = new Uint8Array(15000);
            for (let row = 0; row < 300; row++) {
                for (let byteN = 0; byteN < 50; byteN++) {
                    let b = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        if (adjusted[row * 400 + byteN * 8 + bit] >= 128) b |= (1 << (7 - bit));
                    }
                    buf[row * 50 + byteN] = b;
                }
            }
            pendingImage = buf;
            drawImagePreview(buf);
        }

        function renderTextToCanvas(text, targetCtx) {
            const W = 400, H = 300;
            targetCtx.fillStyle = "#fff";
            targetCtx.fillRect(0, 0, W, H);
            if (!text) return;

            let fontSize = text.length > 80 ? 20 : text.length > 40 ? 26 : 34;
            const maxWidth = W - 48;
            const lineHeight = Math.round(fontSize * 1.45);

            targetCtx.fillStyle = "#000";
            targetCtx.font = `bold ${fontSize}px Arial, sans-serif`;
            targetCtx.textBaseline = "top";
            targetCtx.textAlign = "center";

            const lines = [];
            for (const rawLine of text.split("\n")) {
                const words = rawLine.split(" ");
                let line = "";
                for (const word of words) {
                    const test = line ? line + " " + word : word;
                    if (targetCtx.measureText(test).width > maxWidth && line) {
                        lines.push(line); line = word;
                    } else { line = test; }
                }
                if (line || rawLine === "") lines.push(line);
            }

            const totalH = lines.length * lineHeight;
            const startY = Math.round((H - totalH) / 2);
            lines.forEach((l, i) => targetCtx.fillText(l, W / 2, startY + i * lineHeight));
        }

        function drawTextPreview(text) {
            renderTextToCanvas(text, ctx);
        }

        // Draw 1bpp image buffer (400x300) onto a 400x300 canvas
        function drawImagePreview(buf) {
            const imgData = ctx.createImageData(400, 300);
            const px = imgData.data;
            for (let row = 0; row < 300; row++) {
                for (let col = 0; col < 400; col++) {
                    const byteIdx = row * 50 + Math.floor(col / 8);
                    const bitIdx  = 7 - (col % 8);
                    const white   = (buf[byteIdx] >> bitIdx) & 1;
                    const v       = white ? 255 : 0;
                    const i       = (row * 400 + col) * 4;
                    px[i] = px[i+1] = px[i+2] = v;
                    px[i+3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // ---- Image processing ----
        function processImage(file) {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);

                // Draw to offscreen 400x300 canvas (letterbox)
                const offscreen = document.createElement("canvas");
                offscreen.width = 400; offscreen.height = 300;
                const oc = offscreen.getContext("2d");
                oc.fillStyle = "white";
                oc.fillRect(0, 0, 400, 300);

                const scale = Math.min(400 / img.width, 300 / img.height);
                const sw = img.width * scale, sh = img.height * scale;
                oc.drawImage(img, (400 - sw) / 2, (300 - sh) / 2, sw, sh);

                // Convert to grayscale then auto-level (stretch histogram to 0-255)
                const pixels = oc.getImageData(0, 0, 400, 300).data;
                const g = new Float32Array(400 * 300);
                for (let i = 0; i < g.length; i++) {
                    const p = i * 4;
                    g[i] = 0.299 * pixels[p] + 0.587 * pixels[p+1] + 0.114 * pixels[p+2];
                }
                let lo = 255, hi = 0;
                for (let i = 0; i < g.length; i++) { if (g[i] < lo) lo = g[i]; if (g[i] > hi) hi = g[i]; }
                const range = hi - lo || 1;
                rawGray = new Float32Array(g.length);
                for (let i = 0; i < g.length; i++) rawGray[i] = (g[i] - lo) / range * 255;

                // Reset sliders
                brightnessSlider.value = "0"; brightnessVal.textContent = "0";
                contrastSlider.value = "100"; contrastVal.textContent = "1.0x";

                msgInput.disabled = true;
                msgInput.value = "";
                charCount.textContent = "image mode";
                dropZone.textContent = file.name + "  [click to change]";
                dropZone.classList.add("has-image");
                sendBtn.textContent = "Send Image to Display";
                imgControls.style.display = "block";

                setImageMode();
                applyAndPreview();
            };
            img.src = url;
        }

        function clearImage() {
            pendingImage = null;
            rawGray = null;
            imgControls.style.display = "none";
            msgInput.disabled = false;
            charCount.textContent = `${msgInput.value.length} / 300`;
            dropZone.textContent = "Drop image or click to upload";
            dropZone.classList.remove("has-image");
            sendBtn.textContent = "Send to Display";
            setTextMode();
            drawTextPreview(msgInput.value || lastSent);
        }

        // ---- Drop zone events ----
        dropZone.addEventListener("click", () => {
            if (pendingImage) { clearImage(); return; }
            fileInput.click();
        });
        fileInput.addEventListener("change", () => {
            if (fileInput.files[0]) processImage(fileInput.files[0]);
            fileInput.value = "";
        });
        dropZone.addEventListener("dragover", e => {
            e.preventDefault();
            dropZone.classList.add("drag-over");
        });
        dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
        dropZone.addEventListener("drop", e => {
            e.preventDefault();
            dropZone.classList.remove("drag-over");
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith("image/")) processImage(file);
        });

        // ---- Text input ----
        msgInput.addEventListener("input", () => {
            charCount.textContent = `${msgInput.value.length} / 300`;
            drawTextPreview(msgInput.value || lastSent);
        });

        // ---- Base64 encode ----
        function toBase64(buf) {
            let bin = "";
            for (let i = 0; i < buf.length; i++) bin += String.fromCharCode(buf[i]);
            return btoa(bin);
        }

        // ---- Pack canvas to 1bpp buffer ----
        function packEink(srcCanvas) {
            const pixels = srcCanvas.getContext("2d").getImageData(0, 0, 400, 300).data;
            const buf = new Uint8Array(15000);
            for (let row = 0; row < 300; row++) {
                for (let b = 0; b < 50; b++) {
                    let byte = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        const p = (row * 400 + b * 8 + bit) * 4;
                        const gray = 0.299 * pixels[p] + 0.587 * pixels[p+1] + 0.114 * pixels[p+2];
                        if (gray >= 160) byte |= (1 << (7 - bit));
                    }
                    buf[row * 50 + b] = byte;
                }
            }
            return buf;
        }

        // ---- Send ----
        async function sendImage(buf) {
            const b64 = toBase64(buf); // 20000 chars
            sendBtn.disabled = true;
            for (let i = 0; i < TOTAL_CHUNKS; i++) {
                const chunkB64 = b64.slice(i * (CHUNK_BYTES * 4 / 3), (i + 1) * (CHUNK_BYTES * 4 / 3));
                const msg = `IMG:${String(i+1).padStart(2,"0")}/${TOTAL_CHUNKS}:${chunkB64}`;
                client.publish(TOPIC, msg);
                sendBtn.textContent = `Sending image... ${i+1}/${TOTAL_CHUNKS}`;
                await new Promise(r => setTimeout(r, 150));
            }
            sendBtn.textContent = "Send Image to Display";
            sendBtn.disabled = false;
        }

        sendBtn.addEventListener("click", async () => {
            if (pendingImage) {
                await sendImage(pendingImage);
                client.publish(TOPIC, "CMD:RETURN");
                return;
            }
            const msg = msgInput.value.trim();
            if (!msg) return;
            lastSent = msg;

            // Render text to an offscreen canvas and send as image
            const offscreen = document.createElement("canvas");
            offscreen.width = 400; offscreen.height = 300;
            renderTextToCanvas(msg, offscreen.getContext("2d"));
            const buf = packEink(offscreen);
            await sendImage(buf);

            // Signal dashboard to update Last Message card and return after 2.5s
            client.publish(TOPIC, "TXT:" + msg);

            msgInput.value = "";
            charCount.textContent = "0 / 300";
            drawTextPreview(lastSent);
        });

        // Initial state
        setTextMode();
        drawTextPreview("");
    </script>
</body>
</html>
